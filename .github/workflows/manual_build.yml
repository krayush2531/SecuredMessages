name: Manual Build\n\non:\n  workflow_dispatch:\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Set up JDK 17\n        uses: actions/setup-java@v2\n        with:\n          java-version: '17'\n          distribution: 'adopt'\n      - name: Ensure gradlew is executable\n        run: chmod +x gradlew\n      - name: Build APK\n        run: ./gradlew assembleDebug\n      - name: Upload APK\n        uses: actions/upload-artifact@v2\n        with:\n          name: app-debug-apk\n          path: app/build/outputs/apk/debug/app-debug.apk\n